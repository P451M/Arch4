name: Release OpenVSX

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish artifacts to OpenVSX
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - if: ${{ inputs.publish == 'true' && !startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "OpenVSX publishing is allowed only from release tags." >&2
          exit 1
      - run: pnpm setup:runtime
      - run: pnpm build
      - run: pnpm check
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm smoke
      - run: pnpm verify:runtime
      - run: pnpm audit --prod
      - run: pnpm package:cli
      - run: pnpm package:extension -- --platform linux-x64
      - name: Ensure generated artifacts stay out of git
        run: |
          git status --short
          test -z "$(git status --short)"

  package:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            os: macos-latest
          - platform: darwin-x64
            os: macos-13
          - platform: linux-x64
            os: ubuntu-latest
          - platform: win32-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: extension
        run: echo "version=$(node -p \"require('./packages/cursor-extension/package.json').version\")" >> "$GITHUB_OUTPUT"
      - run: pnpm setup:runtime -- --platform ${{ matrix.platform }}
      - run: pnpm build
      - run: pnpm package:extension -- --platform ${{ matrix.platform }}
      - uses: actions/upload-artifact@v4
        with:
          name: arch4-${{ matrix.platform }}-vsix
          path: artifacts/arch4-${{ steps.extension.outputs.version }}-${{ matrix.platform }}.vsix
      - if: ${{ inputs.publish == 'true' && startsWith(github.ref, 'refs/tags/') }}
        run: node scripts/publish-openvsx.mjs artifacts/arch4-${{ steps.extension.outputs.version }}-${{ matrix.platform }}.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
