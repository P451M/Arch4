name: Lightweight issue
description: For kind souls too busy for a full report but too nice to leave us guessing.
title: "[Issue]: "
body:
  - type: textarea
    id: summary
    attributes:
      label: What should we know?
      description: One sentence is allowed. Half a clue is better than silence.
      placeholder: Arch4 did something weird when...
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: Type
      description: Optional, but it helps route the issue.
      options:
        - Bug
        - Feature request
        - Documentation
        - Question
        - Other
    validations:
      required: false

  - type: textarea
    id: details
    attributes:
      label: Optional details
      description: Add any extra context that might help reproduce, understand, or prioritize this.
      placeholder: |
        Steps, example repo shape, command output, screenshots, logs, or links.
        If relevant, include output from `arch4 doctor`.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Optional environment
      description: Useful for bugs and installation issues.
      placeholder: |
        Arch4 version:
        Operating system:
        Cursor version:
        Node/pnpm version:
    validations:
      required: false

  - type: textarea
    id: diagnostics
    attributes:
      label: Optional diagnostics
      description: If available, paste relevant diagnostics from `.arch4/architecture/build/diagnostics.json`.
      render: json
    validations:
      required: false
